<header class="site-header">
  <p class="site-kicker">Academic Website</p>
  <h1 class="site-title"><a href="/">{{ site.Title }}</a></h1>
  <p class="site-tagline">{{ site.Params.tagline }}</p>
  <nav class="site-nav" aria-label="Main navigation">
    {{ $current := .RelPermalink }}
    {{ range site.Menus.main }}
      {{ if not (and (eq $current "/") (eq .URL "/")) }}
      {{ $active := or (eq $current .URL) (and (ne .URL "/") (hasPrefix $current .URL)) }}
      <a href="{{ .URL }}"{{ if $active }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{ end }}
    {{ end }}
  </nav>
</header>
